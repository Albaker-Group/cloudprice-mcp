name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# CI runs zero-trust: no AWS, no PyPI, just tests + lint. Safe to allow on PRs.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + dev deps
        run: |
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q
      - name: Lint with ruff
        run: ruff check src tests
