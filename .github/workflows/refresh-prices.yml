name: Refresh price catalog

# Weekly auto-refresh against each cloud's public pricing API.
# Opens a PR with the updated prices.json + a dated snapshot.
# You review + merge -> a new patch release goes out (separate workflow, v0.7.1+).
#
# Triggered by:
#   - Scheduled cron (every Sunday 02:00 UTC)
#   - Manual run (workflow_dispatch) for ad-hoc verification
#
# Forks CANNOT trigger this: schedule + workflow_dispatch only fire from the
# default branch with the owner's identity. The OIDC trust policy on the AWS
# role further restricts to ref:refs/heads/main.

on:
  schedule:
    - cron: "0 2 * * 0"  # Sundays at 02:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run only (don't open a PR)"
        type: boolean
        default: false

# Required for the OIDC role assumption + PR creation.
permissions:
  id-token: write   # AWS OIDC
  contents: write   # push the branch with the refreshed prices.json
  pull-requests: write  # open the PR

# Don't pile up if a refresh is slow; cancel any in-flight run when a new one starts.
concurrency:
  group: refresh-prices
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install boto3 (script-only dep, not in package deps)
        run: pip install boto3 httpx

      - name: Configure AWS credentials (OIDC — no stored keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Run refresh
        env:
          # GCP Cloud Billing Catalog API key (restricted to Cloud Billing API).
          # Without this the GCP fetcher cleanly skips. With it, all 4 clouds refresh.
          GCP_API_KEY: ${{ secrets.GCP_API_KEY }}
        run: |
          set -euo pipefail
          python scripts/refresh_prices.py --output-summary /tmp/summary.md

      - name: Build PR body file
        # Writes /tmp/pr_body.md combining the standard PR template + the refresh
        # summary. Bypasses the GITHUB_OUTPUT heredoc entirely (which kept tripping
        # over missing trailing newlines + arbitrary error text in v0.11.0/0.11.1).
        # peter-evans/create-pull-request's body-path option reads files directly.
        run: |
          {
            echo "Automated price refresh from AWS / Azure / OCI public pricing APIs."
            echo ""
            cat /tmp/summary.md
            echo ""
            echo ""
            echo "---"
            echo "**Review checklist**"
            echo "- [ ] Snapshot file \`src/cloudprice_mcp/data/prices/YYYY-MM-DD.json\` created"
            echo "- [ ] Diffs look reasonable (no clouds dropped, no 10x+ spikes)"
            echo "- [ ] Tests still pass (CI on this PR)"
            echo "- [ ] Ready to merge — a release will be tagged after merge"
            echo ""
            echo "Generated by \`.github/workflows/refresh-prices.yml\`."
          } > /tmp/pr_body.md

      - name: Check if anything changed
        id: changes
        run: |
          if [[ -n "$(git status --porcelain src/cloudprice_mcp/data/)" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No price changes detected — refresh produced an identical catalog."
          fi

      - name: Open or update PR
        if: steps.changes.outputs.changed == 'true' && inputs.dry_run != true
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/refresh-prices
          delete-branch: true
          commit-message: "chore(prices): weekly refresh from provider APIs"
          title: "chore(prices): weekly refresh (${{ github.run_id }})"
          body-path: /tmp/pr_body.md
          labels: |
            auto-refresh
            prices

      - name: Dry-run summary
        if: steps.changes.outputs.changed == 'true' && inputs.dry_run == true
        run: |
          echo "::notice::Dry-run requested — no PR opened. Summary:"
          cat /tmp/summary.md
