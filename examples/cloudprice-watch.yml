# Example GitHub Action — Cost Drift Sentinel for any IaC repo (v0.9.0+).
#
# Drop this file at .github/workflows/cloudprice-watch.yml in YOUR repo, along
# with a workload.json describing your cloud footprint. The Action will:
#
#   1. Install cloudprice-mcp
#   2. Load workload.json (the spec you're watching)
#   3. Load .cloudprice-baseline.json if it exists (the prior baseline)
#   4. Call watch_workload via `cloudprice-mcp` Python API
#   5. On drift > threshold: open an issue + commit the new baseline
#   6. On no drift: silently exit clean
#
# This template uses Python directly so you don't need the MCP server running.

name: Cloudprice drift sentinel

on:
  schedule:
    - cron: "0 13 * * 1"  # Mondays 13:00 UTC — pick whatever cadence fits
  workflow_dispatch: {}

permissions:
  contents: write   # to commit updated baseline
  issues: write     # to open drift-alert issues

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cloudprice-mcp
        run: pip install "cloudprice-mcp~=0.9"

      - name: Run drift sentinel
        id: watch
        run: |
          python <<'PY'
          import json, os, pathlib
          from cloudprice_mcp.finops.sentinel import watch_workload
          from cloudprice_mcp.inventory import parse_dict
          from cloudprice_mcp.pricing import load_catalog

          workload = json.loads(pathlib.Path("workload.json").read_text())
          baseline_path = pathlib.Path(".cloudprice-baseline.json")
          baseline = json.loads(baseline_path.read_text()) if baseline_path.exists() else None

          result = watch_workload(load_catalog(), parse_dict(workload), baseline=baseline)
          pathlib.Path("/tmp/drift_report.json").write_text(json.dumps(result, indent=2))

          # Update the saved baseline if it's stale (first run or workload-spec change).
          if result["kind"] in ("watch_baseline", "watch_baseline_replaced"):
              baseline_path.write_text(json.dumps(result["baseline"], indent=2))
              print("::notice::Wrote fresh baseline to .cloudprice-baseline.json")

          # Surface the headline + alert status as job outputs.
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"alert_triggered={str(result.get('alert_triggered', False)).lower()}\n")
              f.write(f"headline={result['headline']}\n")
              f.write(f"recommended_action={result.get('recommended_action', 'no_action')}\n")
          PY

      - name: Commit baseline if updated
        if: always()
        run: |
          if git diff --quiet -- .cloudprice-baseline.json; then
            echo "No baseline change to commit."
          else
            git config user.name "cloudprice-watch-bot"
            git config user.email "cloudprice-watch-bot@users.noreply.github.com"
            git add .cloudprice-baseline.json
            git commit -m "chore(cloudprice): update drift baseline"
            git push
          fi

      - name: Open drift-alert issue
        if: steps.watch.outputs.alert_triggered == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('/tmp/drift_report.json', 'utf8'));
            const body = [
              `## ${report.headline}`,
              ``,
              `- Recommended action: **${report.recommended_action}**`,
              `- Max drift: ${report.max_drift_pct}% (threshold ${report.threshold_pct}%)`,
              `- Baseline: ${report.baseline_as_of} → today`,
              ``,
              `### Per-cloud breakdown`,
              `| Cloud | Baseline / mo | Current / mo | Drift |`,
              `|---|---|---|---|`,
              ...report.per_cloud.map(r =>
                `| ${r.cloud.toUpperCase()} | $${r.baseline_monthly_usd} | $${r.current_monthly_usd} | ${r.drift_pct >= 0 ? '+' : ''}${r.drift_pct}% |`
              ),
              ``,
              `### Top SKU movers since baseline`,
              `| Cloud | SKU | Drift |`,
              `|---|---|---|`,
              ...report.sku_attribution.slice(0, 10).map(s =>
                `| ${s.cloud.toUpperCase()} | \`${s.sku}\` | ${s.drift_pct >= 0 ? '+' : ''}${s.drift_pct}% |`
              ),
              ``,
              `_Generated by cloudprice-mcp watch_workload. [Tool reference](https://github.com/Albaker-Group/cloudprice-mcp)._`
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Cloud cost drift detected: ${report.max_drift_pct}% (${report.recommended_action})`,
              body,
              labels: ['cloudprice', 'cost-drift'],
            });
